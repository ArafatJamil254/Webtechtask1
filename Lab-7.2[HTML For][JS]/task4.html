<html>
<head>
    <title>Date of Birth Validation</title>
    <script>
        function validate() {
            var dd = document.getElementById("dd").value;
            var mm = document.getElementById("mm").value;
            var yyyy = document.getElementById("yyyy").value;

            if (dd == "" || mm == "" || yyyy == "") {
                alert("Date of birth fields cannot be empty");
                return false;
            }

            if (isNaN(dd) || isNaN(mm) || isNaN(yyyy)) {
                alert("Date of birth must be numeric");
                return false;
            }

            dd = parseInt(dd);
            mm = parseInt(mm);
            yyyy = parseInt(yyyy);

            if (dd < 1 || dd > 31) {
                alert("Day must be between 1 and 31");
                return false;
            }

            if (mm < 1 || mm > 12) {
                alert("Month must be between 1 and 12");
                return false;
            }

            if (yyyy < 1900 || yyyy > 2016) {
                alert("Year must be between 1900 and 2016");
                return false;
            }

            alert("Valid Date of Birth");
            return true;
        }
    </script>
</head>
<body>
    <form onsubmit="return validate()">
        <fieldset style="width:220px;">
            <legend><b>Date of Birth</b></legend>

            dd &nbsp;&nbsp;&nbsp; mm &nbsp;&nbsp;&nbsp; yyyy <br><br>

            <input type="text" id="dd" size="2"> /
            <input type="text" id="mm" size="2"> /
            <input type="text" id="yyyy" size="4">

            <br><br><hr>
            <input type="submit" value="Submit">
        </fieldset>
    </form>
</body>
</html>
