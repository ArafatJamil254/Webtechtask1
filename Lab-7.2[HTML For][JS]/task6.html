<html>
<head>
    <title>Blood Group Validation</title>
    <script>
        function validate() {
            var bg = document.getElementById("bloodgroup").value;

            if (bg == "") {
                alert("Please select a blood group");
                return false;
            }

            alert("Valid Blood Group");
            return true;
        }
    </script>
</head>
<body>
    <form onsubmit="return validate()">
        Blood Group
        <select id="bloodgroup" name="bloodgroup">
            <option value="">Select</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <br><br><hr><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
