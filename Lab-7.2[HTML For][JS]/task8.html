<html>
<head>
    <title>Person Profile</title>
    <script>
        function validate() {
            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var male = document.getElementById("male");
            var female = document.getElementById("female");
            var other = document.getElementById("other");
            var dd = document.getElementById("dd").value;
            var mm = document.getElementById("mm").value;
            var yyyy = document.getElementById("yyyy").value;
            var bloodgroup = document.getElementById("bloodgroup").value;
            var ssc = document.getElementById("ssc");
            var hsc = document.getElementById("hsc");
            var bsc = document.getElementById("bsc");
            var msc = document.getElementById("msc");
            var photo = document.getElementById("photo").value;

            if (name == "") {
                alert("Name cannot be empty");
                return false;
            }

            if (!(name[0] >= 'A' && name[0] <= 'Z') && !(name[0] >= 'a' && name[0] <= 'z')) {
                alert("Name must start with a letter");
                return false;
            }

            var word = 0;
            var i = 0;
            while (i < name.length) {
                while (i < name.length && name[i] == ' ') {
                    i++;
                }
                if (i < name.length) {
                    word++;
                    while (i < name.length && name[i] != ' ') {
                        i++;
                    }
                }
            }

            if (word < 2) {
                alert("Name must contain at least two words");
                return false;
            }

            for (i = 0; i < name.length; i++) {
                var ch = name[i];
                if (!((ch >= 'A' && ch <= 'Z') || (ch >= 'a' && ch <= 'z') || ch == '.' || ch == '-' || ch == ' ')) {
                    alert("Name can contain only letters, dot(.) or dash(-)");
                    return false;
                }
            }

            if (email == "") {
                alert("Email cannot be empty");
                return false;
            }

            var atPos = email.indexOf("@");
            var dotPos = email.lastIndexOf(".");

            if (atPos < 1 || dotPos < atPos + 2 || dotPos + 2 >= email.length) {
                alert("Invalid email address");
                return false;
            }

            if (!male.checked && !female.checked && !other.checked) {
                alert("Please select a gender");
                return false;
            }

            if (dd == "" || mm == "" || yyyy == "") {
                alert("Date of birth cannot be empty");
                return false;
            }

            if (isNaN(dd) || isNaN(mm) || isNaN(yyyy)) {
                alert("Date of birth must be numeric");
                return false;
            }

            dd = parseInt(dd);
            mm = parseInt(mm);
            yyyy = parseInt(yyyy);

            if (dd < 1 || dd > 31) {
                alert("Day must be between 1 and 31");
                return false;
            }

            if (mm < 1 || mm > 12) {
                alert("Month must be between 1 and 12");
                return false;
            }

            if (yyyy < 1900 || yyyy > 2016) {
                alert("Year must be between 1900 and 2016");
                return false;
            }

            if (bloodgroup == "") {
                alert("Please select a blood group");
                return false;
            }

            if (!ssc.checked && !hsc.checked && !bsc.checked && !msc.checked) {
                alert("Please select at least one degree");
                return false;
            }

            if (photo == "") {
                alert("Photo cannot be empty");
                return false;
            }

            alert("Form submitted successfully");
            return true;
        }
    </script>
</head>
<body>
    <form onsubmit="return validate()">
        <table border="1" cellspacing="0" cellpadding="10" width="500">
            <tr>
                <td colspan="3" align="center">
                    <h1>PERSON PROFILE</h1>
                </td>
            </tr>

            <tr>
                <td>Name</td>
                <td><input type="text" id="name" name="name"></td>
                <td></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="text" id="email" name="email"></td>
                <td></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" id="male" name="gender" value="Male">Male
                    <input type="radio" id="female" name="gender" value="Female">Female
                    <input type="radio" id="other" name="gender" value="Other">Other
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Date of Birth</td>
                <td>
                    <input type="text" id="dd" size="2"> /
                    <input type="text" id="mm" size="2"> /
                    <input type="text" id="yyyy" size="4">
                    (dd/mm/yyyy)
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Blood Group</td>
                <td>
                    <select id="bloodgroup" name="bloodgroup">
                        <option value="">Select</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>O+</option>
                        <option>O-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Degree</td>
                <td>
                    <input type="checkbox" id="ssc" name="degree" value="SSC">SSC
                    <input type="checkbox" id="hsc" name="degree" value="HSC">HSC
                    <input type="checkbox" id="bsc" name="degree" value="BSc">BSc
                    <input type="checkbox" id="msc" name="degree" value="MSc">MSc
                </td>
                <td></td>
            </tr>

            <tr>
                <td>Photo</td>
                <td><input type="file" id="photo" name="photo"></td>
                <td></td>
            </tr>

            <tr>
                <td colspan="3" height="50"></td>
            </tr>

            <tr>
                <td colspan="3" align="right">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
