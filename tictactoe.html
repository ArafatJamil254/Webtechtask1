<html>
<head>
    <title>Tic-Tac-Toe Game</title>

    <script>
        var board = ["", "", "", "", "", "", "", "", ""];
        var currentPlayer = "X";
        var gameOver = false;

        function initializeGame() {
            var cells = document.getElementsByClassName("cell");

            for (var i = 0; i < cells.length; i++) {
                cells[i].addEventListener("click", handleClick);
            }

            document.getElementById("status").innerHTML = "Current Player: " + currentPlayer;
        }

        function handleClick() {
            var index = this.getAttribute("data-index");

            if (board[index] != "" || gameOver == true) {
                return;
            }

            board[index] = currentPlayer;
            this.innerHTML = currentPlayer;

            if (checkWinner() == true) {
                document.getElementById("status").innerHTML = "Winner: " + currentPlayer;
                gameOver = true;
                return;
            }

            if (checkDraw() == true) {
                document.getElementById("status").innerHTML = "It's a draw!";
                gameOver = true;
                return;
            }

            if (currentPlayer == "X") {
                currentPlayer = "O";
            }
            else {
                currentPlayer = "X";
            }

            document.getElementById("status").innerHTML = "Current Player: " + currentPlayer;
        }

        function checkWinner() {
            if (board[0] == currentPlayer && board[1] == currentPlayer && board[2] == currentPlayer) {
                highlightWinner(0, 1, 2);
                return true;
            }
            else if (board[3] == currentPlayer && board[4] == currentPlayer && board[5] == currentPlayer) {
                highlightWinner(3, 4, 5);
                return true;
            }
            else if (board[6] == currentPlayer && board[7] == currentPlayer && board[8] == currentPlayer) {
                highlightWinner(6, 7, 8);
                return true;
            }
            else if (board[0] == currentPlayer && board[3] == currentPlayer && board[6] == currentPlayer) {
                highlightWinner(0, 3, 6);
                return true;
            }
            else if (board[1] == currentPlayer && board[4] == currentPlayer && board[7] == currentPlayer) {
                highlightWinner(1, 4, 7);
                return true;
            }
            else if (board[2] == currentPlayer && board[5] == currentPlayer && board[8] == currentPlayer) {
                highlightWinner(2, 5, 8);
                return true;
            }
            else if (board[0] == currentPlayer && board[4] == currentPlayer && board[8] == currentPlayer) {
                highlightWinner(0, 4, 8);
                return true;
            }
            else if (board[2] == currentPlayer && board[4] == currentPlayer && board[6] == currentPlayer) {
                highlightWinner(2, 4, 6);
                return true;
            }

            return false;
        }

        function checkDraw() {
            for (var i = 0; i < board.length; i++) {
                if (board[i] == "") {
                    return false;
                }
            }

            return true;
        }

        function highlightWinner(a, b, c) {
            var cells = document.getElementsByClassName("cell");

            cells[a].style.backgroundColor = "yellow";
            cells[b].style.backgroundColor = "yellow";
            cells[c].style.backgroundColor = "yellow";
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameOver = false;

            var cells = document.getElementsByClassName("cell");

            for (var i = 0; i < cells.length; i++) {
                cells[i].innerHTML = "";
                cells[i].style.backgroundColor = "";
            }

            document.getElementById("status").innerHTML = "Current Player: " + currentPlayer;
        }

        window.onload = initializeGame;
    </script>
</head>
<body>
    <h2>Tic-Tac-Toe Game</h2>

    <p id="status">Current Player: X</p>

    <table border="1" cellspacing="0" cellpadding="20">
        <tr>
            <td class="cell" data-index="0" align="center"></td>
            <td class="cell" data-index="1" align="center"></td>
            <td class="cell" data-index="2" align="center"></td>
        </tr>
        <tr>
            <td class="cell" data-index="3" align="center"></td>
            <td class="cell" data-index="4" align="center"></td>
            <td class="cell" data-index="5" align="center"></td>
        </tr>
        <tr>
            <td class="cell" data-index="6" align="center"></td>
            <td class="cell" data-index="7" align="center"></td>
            <td class="cell" data-index="8" align="center"></td>
        </tr>
    </table>

    <br>

    <input type="button" value="Reset Game" onclick="resetGame()">
</body>
</html>
